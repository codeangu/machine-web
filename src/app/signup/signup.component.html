<div class="d-flex flex-column bg-light overflow-hidden" style="height: calc(100vh - 145px);"> 
  <div class="flex-grow-1 d-flex align-items-center justify-content-center px-3 py-2">
    <div class="card border-0 shadow-sm rounded-4 p-4" style="max-width: 420px; width: 100%;">
      
      <div class="text-center mb-3">
        <h2 class="fw-bold text-dark mb-1">Create Account</h2>
        <p class="text-secondary small mb-0">Join us to manage your system</p>
      </div>

      <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
        <!-- Full Name -->
        <div class="mb-2 text-start">
          <label class="form-label small fw-bold text-muted ms-1 mb-1">Full Name</label>
          <input type="text" class="form-control bg-light border-0 shadow-none fs-6" 
                 formControlName="name" placeholder="John Doe">
        </div>

        <!-- Username -->
        <div class="mb-2 text-start">
          <label class="form-label small fw-bold text-muted ms-1 mb-1">Username</label>
          <input type="text" class="form-control bg-light border-0 shadow-none fs-6" 
                 formControlName="username" placeholder="johndoe123">
        </div>

        <!-- Password -->
        <div class="mb-3 text-start">
          <label class="form-label small fw-bold text-muted ms-1 mb-1">Password</label>
          <div class="input-group bg-light" style="border-radius: 8px;">
            <input [type]="showPassword ? 'text' : 'password'" 
                   class="form-control bg-transparent border-0 shadow-none fs-6" 
                   formControlName="password" placeholder="Create password">
            <button type="button" (click)="toggleShowPassword()" class="btn border-0 text-secondary">
              <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
            </button>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" [disabled]="signupForm.invalid || isLoading" 
                class="btn btn-lg w-100 text-white shadow-sm fw-bold fs-6 py-2"
                style="background-color: #088F8F; border-radius: 8px;">
          <i class="bi me-2" [class.bi-person-plus-fill]="!isLoading" [class.bi-hourglass-split]="isLoading"></i>
          {{ isLoading ? 'Processing...' : 'Sign Up' }}
        </button>

        <div class="text-center mt-3 pt-2 border-top">
          <p class="text-muted small mb-0">
            Already have an account? 
            <a routerLink="/login" class="text-decoration-none fw-bold" style="color: #088F8F;">Sign In</a>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
