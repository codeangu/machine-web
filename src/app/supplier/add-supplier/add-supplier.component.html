<!-- add-supplier.component.html -->
<div class="modal-header bg-primary text-white py-3 border-0">
  <h5 class="modal-title fw-bold">
    <i class="bi" [ngClass]="isEditMode ? 'bi-pencil-square' : 'bi-person-plus-fill'"></i>
    {{ isEditMode ? 'Update Supplier' : 'Register New Supplier' }}
  </h5>
  <button type="button" class="btn-close btn-close-white shadow-none" (click)="activeModal.dismiss()"></button>
</div>

<div class="modal-body p-4 bg-light">
  <form [formGroup]="supplierForm">
    
    <!-- Section 1: Business Profile -->
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body p-3">
        <h6 class="text-primary fw-bold mb-3 border-bottom pb-2">Business Information</h6>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label small fw-bold">Supplier/Contact Person *</label>
            <input type="text" formControlName="name" class="form-control" placeholder="e.g. Muhammad Ahmed">
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-bold">Company/Shop Name *</label>
            <input type="text" formControlName="companyName" class="form-control" placeholder="e.g. Al-Falah Traders">
          </div>
          <div class="col-md-4">
            <label class="form-label small fw-bold">Phone Number *</label>
            <input type="text" formControlName="phone" class="form-control" placeholder="03xx-xxxxxxx">
          </div>
          <div class="col-md-5">
            <label class="form-label small fw-bold">Email Address</label>
            <input type="email" formControlName="email" class="form-control" placeholder="info@company.com">
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-bold">Status</label>
            <select formControlName="status" class="form-select">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>
          <div class="col-md-12">
            <label class="form-label small fw-bold">Business Address</label>
            <textarea formControlName="address" class="form-control" rows="2" placeholder="Complete address..."></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- Section 2: Financial Opening State -->
    <div class="card border-0 shadow-sm">
      <div class="card-body p-3">
        <h6 class="text-primary fw-bold mb-3 border-bottom pb-2">Financial Opening Balance</h6>
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label small fw-bold">Opening Balance</label>
            <div class="input-group">
              <span class="input-group-text bg-white">Rs</span>
              <input type="number" formControlName="openingBalance" class="form-control">
            </div>
            <div class="form-text mt-1" style="font-size: 0.7rem;">Previous pending balance</div>
          </div>
          <div class="col-md-4">
            <label class="form-label small fw-bold">Total Purchases</label>
            <div class="input-group">
              <span class="input-group-text bg-white">Rs</span>
              <input type="number" formControlName="totalPurchase" class="form-control">
            </div>
          </div>
          <div class="col-md-4">
            <label class="form-label small fw-bold">Total Paid</label>
            <div class="input-group">
              <span class="input-group-text bg-white">Rs</span>
              <input type="number" formControlName="totalPaid" class="form-control">
            </div>
          </div>
        </div>
      </div>
    </div>

  </form>
</div>

<div class="modal-footer bg-white py-3 border-0 shadow-sm">
  <button type="button" class="btn btn-light px-4 fw-bold" (click)="activeModal.dismiss()">Cancel</button>
  <button type="submit" 
          class="btn btn-primary px-5 fw-bold" 
          (click)="onSubmit()" 
          [disabled]="supplierForm.invalid || loading">
    <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
    {{ isEditMode ? 'Update Supplier' : 'Save Supplier' }}
  </button>
</div>
