<div class="login-hero d-flex align-items-center justify-content-center px-3">
  <div class="login-card card border-0 rounded-4 p-4 p-md-5">

    <!-- Brand -->
    <div class="text-center mb-4">
      <div class="login-logo mx-auto mb-3">
        <i class="bi bi-gear-fill"></i>
      </div>
      <h2 class="fw-bold text-dark mb-1">Welcome Back</h2>
      <p class="text-secondary small mb-0">Sign in to <span class="fw-bold">MACHINE<span class="text-warning">MANAGEMENT</span></span></p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Username Field -->
      <div class="mb-3 text-start">
        <label class="form-label small fw-bold text-muted ms-1">Username</label>
        <div class="input-group login-input">
          <span class="input-group-text bg-transparent border-0"><i class="bi bi-person text-muted"></i></span>
          <input type="text"
                 class="form-control form-control-lg bg-transparent border-0 shadow-none fs-6"
                 formControlName="username"
                 placeholder="Enter your username">
        </div>
      </div>

      <!-- Password Field -->
      <div class="mb-3 text-start">
        <label class="form-label small fw-bold text-muted ms-1 mb-1">Password</label>
        <div class="input-group login-input">
          <span class="input-group-text bg-transparent border-0"><i class="bi bi-lock text-muted"></i></span>
          <input [type]="showPassword ? 'text' : 'password'"
                 class="form-control form-control-lg bg-transparent border-0 shadow-none fs-6"
                 formControlName="password"
                 placeholder="Enter password">
          <button type="button" (click)="toggleShowPassword()" class="btn border-0 text-secondary px-3">
            <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
          </button>
        </div>
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading"
              class="btn btn-primary btn-lg w-100 mt-3 fw-bold fs-6 py-3 rounded-3">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
        {{ isLoading ? 'Processing...' : 'Sign In' }}
      </button>

      <div class="text-center mt-4">
        <p class="text-muted small mb-0">
          Don't have an account? <a routerLink="/signup" class="text-decoration-none fw-bold text-primary">Create Account</a>
        </p>
      </div>
    </form>
  </div>
</div>
